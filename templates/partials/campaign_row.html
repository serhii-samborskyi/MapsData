<tr class="hover:bg-gray-50 transition-all">
    <td class="px-4 py-3 text-sm text-gray-700">{{ campaign.id }}</td>
    <td class="px-4 py-3 text-sm text-gray-700 font-medium">{{ campaign.name }}</td>
    <td class="px-4 py-3">
        <button onclick="toggleStatus({{ campaign.id }}, '{{ campaign.status }}')" class="px-3 py-1 text-xs font-medium rounded-full cursor-pointer hover:opacity-80 transition-all
            {% if campaign.status == 'active' %}
                bg-green-100 text-green-800
            {% else %}
                bg-gray-100 text-gray-800
            {% endif %}
        ">{{ campaign.status }}</button>
    </td>
    <td class="px-4 py-3 text-sm text-gray-700">{{ campaign.total_requests or 0 }}</td>
    <td class="px-4 py-3 text-sm text-gray-700">{{ campaign.total_contacts or 0 }}</td>
    <td class="px-4 py-3 text-sm text-gray-700">{{ campaign.email_count or 0 }}</td>
    <td class="px-4 py-3 space-x-2">
        <button onclick="toggleRequests({{ campaign.id }})" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-medium hover:bg-blue-200 transition-all">Requests</button>
        <button onclick="toggleContacts({{ campaign.id }})" class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-medium hover:bg-purple-200 transition-all">Contacts</button>
        <button onclick="deleteCampaign({{ campaign.id }})" class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-medium hover:bg-red-200 transition-all">Delete</button>
    </td>
</tr>
