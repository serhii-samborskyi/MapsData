<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrapIQ Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="app-shell">
    <div class="fixed inset-0 z-10 bg-slate-900/35 backdrop-blur-[2px]"></div>
    <div class="relative z-20 min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md rounded-2xl border border-white/50 bg-white/95 p-6 shadow-2xl">
            <div class="mb-5">
                <p class="app-chip">ScrapIQ</p>
                <h1 class="section-title text-2xl font-semibold text-slate-900 mt-2">Sign In</h1>
                <p class="text-sm text-slate-600 mt-1">Enter your login and password to access the dashboard.</p>
            </div>

            {% if not auth_enabled %}
            <div class="rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-700 mb-4">
                Auth is disabled because `LOGIN` and `PASSWORD` env vars are not set.
            </div>
            {% endif %}

            {% if error %}
            <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 mb-4">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/auth/login" class="space-y-4">
                <input type="hidden" name="next" value="{{ next_path }}">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Login</label>
                    <input id="username" name="username" type="text" required autocomplete="username" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-800 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required autocomplete="current-password" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-800 outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200">
                </div>
                <button type="submit" class="w-full rounded-lg bg-sky-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-sky-700">
                    Access Dashboard
                </button>
            </form>
        </div>
    </div>
</body>
</html>
